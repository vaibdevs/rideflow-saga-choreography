version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: rideflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - rideflow-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: rideflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - rideflow-network

  postgres:
    image: postgres:15-alpine
    container_name: rideflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rideflow
      POSTGRES_USER: rideflow
      POSTGRES_PASSWORD: rideflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - rideflow-network

  redis:
    image: redis:7-alpine
    container_name: rideflow-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - rideflow-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: rideflow-zipkin
    ports:
      - "9411:9411"
    networks:
      - rideflow-network

volumes:
  postgres_data:

networks:
  rideflow-network:
    driver: bridge
